services:
  db:
    image: postgres:15-alpine
    container_name: vertex-db
    restart: "no"
    environment:
      POSTGRES_DB: djangocms
      POSTGRES_USER: djangocms
      POSTGRES_PASSWORD: djangocms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${VERTEX_DB_PORT:-5436}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djangocms"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: vertex-web
    restart: "no"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_superuser_auto &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/static
    ports:
      - "${VERTEX_WEB_PORT:-8300}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://djangocms:djangocms@db:5432/djangocms
      DJANGO_SETTINGS_MODULE: mysite.settings
      SECRET_KEY: change-me-in-production-please
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin

volumes:
  postgres_data:
  media_data:
  static_data:
