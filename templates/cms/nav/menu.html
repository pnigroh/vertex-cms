{% load menu_tags %}
{% for child in children %}
  {% if child.children %}
    <li class="dropdown{% if child.selected %} active{% endif %}{% if child.ancestor %} active{% endif %}">
      <a href="{{ child.attr.redirect_url|default:child.get_absolute_url }}">{{ child.get_menu_title }}</a>
      <i class="fa fa-angle-down"></i>
      <ul class="dropdown-menu">
        {% for grandchild in child.children %}
          <li{% if grandchild.selected %} class="active"{% endif %}>
            <a href="{{ grandchild.attr.redirect_url|default:grandchild.get_absolute_url }}">{{ grandchild.get_menu_title }}</a>
          </li>
        {% endfor %}
      </ul>
    </li>
  {% else %}
    <li{% if child.selected %} class="active"{% endif %}{% if child.ancestor %} class="active"{% endif %}>
      <a href="{{ child.attr.redirect_url|default:child.get_absolute_url }}">{{ child.get_menu_title }}</a>
    </li>
  {% endif %}
{% endfor %}
